<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>VisionEditCV — History</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body data-screen="history">
  <div class="device">
    <div class="dynamic-island" aria-hidden="true"></div>
    <div class="app">
      <div class="status">
        <div class="mono">9:41</div>
        <div class="right mono"><span>5G</span><span>▮▮▮</span><span>▮▮</span></div>
      </div>

      <div class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"><svg><use href="#i-mark"></use></svg></div>
          <div class="stack">
            <div class="name">VisionEditCV</div>
            <div class="file js-file-name">IMG_0427.jpg</div>
          </div>
        </div>
        <div class="grow"></div>
        <div class="pill js-server-pill"><span class="dot"></span><span class="txt">CONNECTED</span></div>
        <button class="iconbtn" title="Hold to compare" data-hold="before"><svg><use href="#i-compare"></use></svg></button>
      </div>

      
      <div class="main">
        <div class="list" style="align-content:start; min-height:0; overflow:auto; padding-right:2px">
          <div class="card">
            <div class="row2">
              <div>
                <div class="k">HISTORY</div>
                <div class="h">Edits you’ve applied</div>
              </div>
              <button class="btn small ghost" data-action="clear-history">Clear</button>
            </div>
            <div class="p" style="margin-top:8px">Tap into Masks to continue. Hold “Hold to compare” on any step to show BEFORE.</div>
          </div>
          <div class="list" data-history></div>
        </div>

        <div class="dock" aria-label="Shortcuts">
          <div class="row">
            <a class="btn small" href="editor.html" style="text-decoration:none"><svg><use href="#t-editor"></use></svg>Back to Masks</a>
            <a class="btn small primary" href="effects.html" style="text-decoration:none"><svg><use href="#t-effects"></use></svg>Apply another effect</a>
          </div>
        </div>
      </div>


      <div class="tabs" role="navigation" aria-label="Bottom tabs">
        <a class="tab" data-tab="home" href="home.html"><svg><use href="#t-home"></use></svg><div class="l">Home</div></a>
        <a class="tab" data-tab="editor" href="editor.html"><svg><use href="#t-editor"></use></svg><div class="l">Masks</div></a>
        <a class="tab" data-tab="effects" href="effects.html"><svg><use href="#t-effects"></use></svg><div class="l">Effects</div></a>
        <a class="tab" data-tab="history" href="history.html"><svg><use href="#t-history"></use></svg><div class="l">History</div></a>
        <a class="tab" data-tab="settings" href="settings.html"><svg><use href="#t-settings"></use></svg><div class="l">Settings</div></a>
      </div>
    </div>
  </div>

  <!-- Inline symbols: copy this block into each screen -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-mark" viewBox="0 0 24 24">
    <path d="M7 17c2.4-1.8 4.2-5.2 5-9 1.4 2.8 3.1 5.3 5 7.1-2.2 1.5-4.6 2.3-7.2 2.3-1.1 0-2.1-.1-2.8-.4z" fill="currentColor"/>
  </symbol>
  <symbol id="i-undo" viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4"/><path d="M5 10h9a6 6 0 1 1 0 12h-3"/></symbol>
  <symbol id="i-redo" viewBox="0 0 24 24"><path d="M15 14l4-4-4-4"/><path d="M19 10H10a6 6 0 1 0 0 12h3"/></symbol>
  <symbol id="i-compare" viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M19 6H6a3 3 0 0 0-3 3v6a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/></symbol>
  <symbol id="i-share" viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/></symbol>

  <symbol id="t-home" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 10.5V21h13V10.5"/></symbol>
  <symbol id="t-editor" viewBox="0 0 24 24"><path d="M4 17.5V20h2.5L19 7.5 16.5 5 4 17.5z"/><path d="M14.5 6.5 17 9"/></symbol>
  <symbol id="t-effects" viewBox="0 0 24 24"><path d="M12 3c2.6 3.2 5 6.2 5 9a5 5 0 0 1-10 0c0-2.8 2.4-5.8 5-9z"/><path d="M8 21h8"/></symbol>
  <symbol id="t-history" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/><path d="M12 7v6l4 2"/></symbol>
  <symbol id="t-settings" viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/><path d="M19.4 15a7.8 7.8 0 0 0 .1-2l2-1.2-2-3.5-2.3.7a7.6 7.6 0 0 0-1.6-1l-.3-2.4H10.7L10.4 7a7.6 7.6 0 0 0-1.6 1l-2.3-.7-2 3.5 2 1.2a7.8 7.8 0 0 0 .1 2l-2 1.2 2 3.5 2.3-.7a7.6 7.6 0 0 0 1.6 1l.3 2.4h4.6l.3-2.4a7.6 7.6 0 0 0 1.6-1l2.3.7 2-3.5-2-1.2z"/></symbol>

  <symbol id="tool-select" viewBox="0 0 24 24"><path d="M5 4l6 14 2-5 5-2L5 4z"/></symbol>
  <symbol id="tool-mask" viewBox="0 0 24 24"><path d="M12 3l8 4v6c0 5-3.3 8.8-8 10-4.7-1.2-8-5-8-10V7l8-4z"/></symbol>
  <symbol id="tool-crop" viewBox="0 0 24 24"><path d="M6 2v16a4 4 0 0 0 4 4h14"/><path d="M18 22V6a4 4 0 0 0-4-4H0"/></symbol>
  <symbol id="tool-erase" viewBox="0 0 24 24"><path d="M20 20H9l-6-6 9-9 9 9-1 1"/><path d="M9 20l7-7"/></symbol>
  <symbol id="tool-text" viewBox="0 0 24 24"><path d="M4 6V4h16v2"/><path d="M10 20V4"/><path d="M14 20V10"/></symbol>
  <symbol id="tool-box" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 8h8v8H8z"/></symbol>
</svg>
  <script src="shared.js"></script>
</body>
</html>
