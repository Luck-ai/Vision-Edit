<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>VisionEditCV Mobile</title>
<style>
  :root {
    --bg: oklch(15% 0.02 260);
    --surface: oklch(25% 0.04 260);
    --fg: oklch(95% 0.01 260);
    --muted: oklch(65% 0.03 260);
    --border: oklch(35% 0.04 260);
    --accent: oklch(80% 0.14 220);
    
    --bg-raw: #0E0F15;
    --panel-raw: #15171F;
    --panel-elev-raw: #1A1D27;
    --border-soft: #1F2330;
    --accent-soft: rgba(34, 211, 238, 0.16);
    --accent-muted: rgba(34, 211, 238, 0.35);
    --success: #4ADE80;
    
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    margin: 0; padding: 0;
    background: #000;
    color: var(--fg);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Android Phone Frame */
  .device-frame {
    width: 100%;
    max-width: 412px;
    height: 100%;
    max-height: 915px;
    background: var(--bg-raw);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  @media (min-width: 413px) {
    .device-frame {
      height: 90vh;
      border-radius: 32px;
      border: 6px solid #222;
    }
  }

  .status-bar {
    height: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--fg);
    z-index: 10;
  }
  
  .status-bar .punch-hole {
    width: 20px; height: 20px;
    background: #000;
    border-radius: 50%;
    position: absolute;
    left: 50%; top: 6px;
    transform: translateX(-50%);
  }

  /* Chrome */
  .topbar {
    flex-shrink: 0;
    background: var(--bg-raw);
    border-bottom: 1px solid var(--border-soft);
    padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    min-height: 52px;
    z-index: 10;
  }
  
  .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent-soft); border: 1px solid var(--accent-muted);
    display: grid; place-items: center;
  }
  
  .logo svg { width: 16px; height: 16px; fill: var(--accent); }
  .brand-stack { display: flex; flex-direction: column; line-height: 1.2; }
  .brand-stack .name { font-size: 14px; font-weight: 600; }
  .brand-stack .file { font-size: 11px; color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .topbar .grow { flex: 1; }
  
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.4);
    color: var(--success);
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  
  .iconbtn {
    width: 36px; height: 36px; border-radius: 8px;
    background: transparent; border: 1px solid transparent;
    display: grid; place-items: center; color: var(--muted);
    cursor: pointer; transition: 0.15s;
  }
  .iconbtn:hover, .iconbtn:active { background: var(--panel-elev-raw); color: var(--fg); border-color: var(--border-soft); }
  .iconbtn svg { width: 20px; height: 20px; }

  /* Canvas */
  .canvas {
    flex: 1;
    margin: 12px;
    border-radius: 16px;
    border: 1px solid var(--border-soft);
    background:
      radial-gradient(circle at 50% 50%, rgba(34,211,238,0.05), transparent 60%),
      linear-gradient(135deg, #101118 25%, #15171F 25%, #15171F 50%, #101118 50%, #101118 75%, #15171F 75%) 0 0 / 20px 20px;
    position: relative;
    overflow: hidden;
  }
  
  .canvas-image {
    position: absolute; inset: 0;
    margin: auto;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0.8;
  }

  .canvas-mask {
    position: absolute; top: 20%; left: 20%; width: 60%; height: 50%;
    border: 2px solid var(--accent);
    border-radius: 12px;
    background: rgba(34, 211, 238, 0.15);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
    display: none;
  }
  .canvas-mask.active { display: block; }
  
  .canvas .accent-rail {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  
  .float-toolbar {
    position: absolute; top: 12px; right: 12px;
    display: flex; gap: 6px; padding: 6px;
    background: rgba(20, 22, 30, 0.85);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    backdrop-filter: blur(10px);
  }
  .float-toolbar .iconbtn { width: 32px; height: 32px; }

  /* Bottom Nav */
  .botnav {
    flex-shrink: 0;
    display: grid; grid-template-columns: repeat(5, 1fr);
    padding: 8px 12px; gap: 4px;
    background: var(--bg-raw);
    border-top: 1px solid var(--border-soft);
    padding-bottom: 24px; /* safe area */
    z-index: 20;
  }
  
  .navbtn {
    background: transparent; border: 0; color: var(--muted);
    padding: 10px 4px; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; font-family: inherit;
    transition: 0.2s;
  }
  .navbtn:hover, .navbtn:active { color: var(--fg); background: var(--panel-elev-raw); }
  .navbtn svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .navbtn .lbl { font-size: 11px; font-weight: 500; }
  
  .navbtn.active { color: var(--accent); background: var(--accent-soft); }
  .navbtn.cta { color: #000; background: var(--accent); }
  .navbtn.cta:hover { filter: brightness(1.1); }

  /* Bottom panel (docked, never covers canvas) */
  .sheet {
    flex-shrink: 0;
    position: relative;
    left: auto; right: auto; bottom: auto;
    background: var(--panel-raw);
    border-top-left-radius: 24px; border-top-right-radius: 24px;
    border: 1px solid var(--border-soft);
    border-bottom: none;
    box-shadow: 0 -20px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;

    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transform: translateY(12px);
    transition:
      max-height 0.32s cubic-bezier(0.2, 0.9, 0.3, 1),
      opacity 0.18s ease,
      transform 0.32s cubic-bezier(0.2, 0.9, 0.3, 1);
    will-change: max-height, transform;
  }
  .sheet.open {
    max-height: 60vh;
    opacity: 1;
    transform: translateY(0);
  }

  .sheet .handle { height: 24px; display: grid; place-items: center; flex-shrink: 0; }
  .sheet .handle::after { content: ''; width: 40px; height: 5px; border-radius: 5px; background: var(--muted); opacity: 0.5; }

  .sheet .head {
    padding: 0 20px 12px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border-soft);
  }
  .sheet .head .title { font-size: 16px; font-weight: 600; flex: 1; }
  .sheet .head .close {
    width: 32px; height: 32px; border-radius: 8px;
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    font-size: 18px; display: grid; place-items: center;
  }

  .sheet .body { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* Drawer */
  .scrim {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 30; backdrop-filter: blur(2px);
  }
  .drawer-open .scrim { opacity: 1; pointer-events: auto; }
  
  .drawer {
    position: absolute; top: 0; left: 0; bottom: 0; width: 80%;
    background: var(--bg-raw);
    border-right: 1px solid var(--border-soft);
    box-shadow: 12px 0 40px rgba(0,0,0,0.6);
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
    display: flex; flex-direction: column;
    z-index: 40;
  }
  .drawer-open .drawer { transform: translateX(0); }
  
  .drawer .head {
    padding: 32px 20px 20px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 12px;
  }
  
  .drawer .item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    color: var(--muted);
    cursor: pointer;
    transition: 0.15s;
  }
  .drawer .item:hover, .drawer .item:active { background: var(--panel-elev-raw); color: var(--fg); }
  .drawer .item.active { background: var(--accent-soft); color: var(--accent); }
  .drawer .item svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .drawer .item .lbl { font-size: 15px; font-weight: 500; }

  /* Form Elements */
  .h3 { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin: 0 0 10px; }
  
  .toolpill {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--bg-raw); border: 1px solid var(--border-soft);
    border-radius: 12px; padding: 4px; margin-bottom: 20px;
  }
  .toolpill .opt {
    padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
    color: var(--muted); border-radius: 8px; cursor: pointer; transition: 0.2s;
  }
  .toolpill .opt.active { background: var(--accent-soft); color: var(--accent); }
  
  .input {
    background: var(--bg-raw); border: 1px solid var(--border-soft);
    border-radius: 12px; padding: 14px 16px;
    font-size: 14px; color: var(--fg); width: 100%;
    font-family: inherit; margin-bottom: 16px;
    transition: 0.2s;
  }
  .input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .input::placeholder { color: var(--muted); }
  
  .btn-primary {
    background: var(--accent); color: #000;
    border: 0; padding: 16px; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    width: 100%; transition: 0.2s;
    display: flex; justify-content: center; align-items: center; gap: 8px;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: transparent; color: var(--fg);
    border: 1px solid var(--border-soft); padding: 16px; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    width: 100%; transition: 0.2s;
  }
  .btn-secondary:active { background: var(--panel-elev-raw); }

  .chip-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px;
    margin: 0 -20px 16px; padding-left: 20px; padding-right: 20px;
    scrollbar-width: none;
  }
  .chip-scroll::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: var(--bg-raw); border: 1px solid var(--border-soft);
    color: var(--muted); padding: 10px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .chip.active { background: var(--accent-soft); border-color: var(--accent-muted); color: var(--accent); }
  
  .param {
    background: var(--bg-raw); border: 1px solid var(--border-soft);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .param .label-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .param .label-row .l { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .param .label-row .v { font-size: 13px; color: var(--accent); font-family: var(--font-mono); }
  
  .slider {
    appearance: none; width: 100%; height: 4px; background: var(--border-soft);
    border-radius: 2px; outline: none;
  }
  .slider::-webkit-slider-thumb {
    appearance: none; width: 20px; height: 20px; background: var(--accent);
    border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 0 6px rgba(34,211,238,0.15);
  }

  .layer-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--bg-raw); border: 1px solid var(--border-soft);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  }
  .layer-row .stripe { width: 4px; height: 28px; border-radius: 2px; background: var(--accent); }
  .layer-row .name { flex: 1; font-size: 14px; font-weight: 600; }
  .layer-row .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .checkbox {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid var(--border); display: grid; place-items: center;
  }
  .checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .checkbox svg { width: 16px; height: 16px; stroke: #000; stroke-width: 3; fill: none; display: none; }
  .checkbox.checked svg { display: block; }
</style>
</head>
<body>

<div class="device-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>10:30</span>
    <div class="punch-hole"></div>
    <div style="display:flex;gap:6px;align-items:center;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M22 10v4"/></svg>
    </div>
  </div>

  <!-- Top Chrome -->
  <div class="topbar">
    <button class="iconbtn" title="History" onclick="openSheet('History')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><path d="M3 12a9 9 0 1 0 4-7.5"/></svg>
    </button>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L22 20L12 16L2 20Z"/></svg>
    </div>
    <div class="brand-stack">
      <span class="name">VisionEdit</span>
      <span class="file">cv_original.png</span>
    </div>
    <div class="grow"></div>
    <span class="pill"><span class="dot"></span>ONLINE</span>
    <button class="iconbtn" title="Server &amp; backend" onclick="openSheet('Server')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M6 10h12M6 14h7"/></svg>
    </button>
    <button class="iconbtn" title="Reset project" onclick="if (confirm('Reset project?')) alert('Project reset.')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9v3"/><path d="M12 6L8 2M12 6l-4 4"/></svg>
    </button>
  </div>

  <!-- Main Canvas -->
  <div class="canvas" id="canvasArea">
    <div class="accent-rail"></div>
    <!-- Dummy image generated via CSS gradients to look like a photo placeholder -->
    <div class="canvas-image" style="background: linear-gradient(45deg, #1f2937, #111827); border-radius: 8px; margin: 10%;"></div>
    
    <div class="canvas-mask" id="maskOverlay"></div>
    
    <div class="float-toolbar">
      <button class="iconbtn" title="Compare"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16M4 4h16v16H4z"/></svg></button>
      <button class="iconbtn" title="Toggle Masks" onclick="toggleMask()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
      <button class="iconbtn" title="Clear All"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4l5 5"/><path d="M4 9c4-4 14-3 15 6"/></svg></button>
    </div>
  </div>

  <!-- Bottom Sheet -->
  <div class="sheet" id="botSheet">
    <div class="handle"></div>
    <div class="head">
      <span class="title" id="sheetTitle">Effects</span>
      <button class="close" onclick="closeSheet()">✕</button>
    </div>
    <div class="body" id="sheetBody">
      <!-- Dynamic Content -->
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="botnav">
    <button class="navbtn cta" onclick="alert('File picker opened')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v12M6 10l6-6 6 6M4 20h16"/></svg>
      <span class="lbl">Open</span>
    </button>
    <button class="navbtn" data-tab="Segment" onclick="openSheet('Segment')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
      <span class="lbl">Segment</span>
    </button>
    <button class="navbtn active" data-tab="Effects" onclick="openSheet('Effects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 17h16M4 12h10"/><circle cx="18" cy="12" r="2"/></svg>
      <span class="lbl">Effects</span>
    </button>
    <button class="navbtn" data-tab="Layers" onclick="openSheet('Layers')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5"/></svg>
      <span class="lbl">Layers</span>
    </button>
    <button class="navbtn" onclick="alert('Exporting image...')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
      <span class="lbl">Export</span>
    </button>
  </div>

</div>

<script>
  const sheet = document.getElementById('botSheet');
  const sheetTitle = document.getElementById('sheetTitle');
  const sheetBody = document.getElementById('sheetBody');
  const navBtns = document.querySelectorAll('.botnav .navbtn');
  const maskOverlay = document.getElementById('maskOverlay');
  
  let activeTab = 'Effects';

  const tabContent = {
    Segment: `
      <p class="h3">Tool Mode</p>
      <div class="toolpill">
        <div class="opt active">Box Select</div>
        <div class="opt" onclick="this.classList.toggle('active'); this.previousElementSibling.classList.toggle('active')">Text Prompt</div>
      </div>
      <p class="h3">Target Selection</p>
      <input class="input" placeholder="e.g. 'person', 'background'..." />
      <button class="btn-primary" onclick="toggleMask(); closeSheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Run SAM3 Segment
      </button>
    `,
    Effects: `
      <div class="chip-scroll">
        <span class="chip active">Color Grade</span>
        <span class="chip">Grayscale</span>
        <span class="chip">Portrait Blur</span>
        <span class="chip">Pixelate</span>
        <span class="chip">Artistic</span>
      </div>
      <div class="param">
        <div class="label-row"><span class="l">Brightness</span><span class="v">+15</span></div>
        <input class="slider" type="range" min="-100" max="100" value="15" oninput="this.previousElementSibling.querySelector('.v').textContent = (this.value > 0 ? '+' : '') + this.value">
      </div>
      <div class="param">
        <div class="label-row"><span class="l">Contrast</span><span class="v">+8</span></div>
        <input class="slider" type="range" min="-50" max="50" value="8" oninput="this.previousElementSibling.querySelector('.v').textContent = (this.value > 0 ? '+' : '') + this.value">
      </div>
      <div class="param">
        <div class="label-row"><span class="l">Saturation</span><span class="v">0</span></div>
        <input class="slider" type="range" min="-100" max="100" value="0" oninput="this.previousElementSibling.querySelector('.v').textContent = (this.value > 0 ? '+' : '') + this.value">
      </div>
      <button class="btn-primary" style="margin-top:8px" onclick="closeSheet()">✓ Apply Effect</button>
    `,
    Layers: `
      <p class="h3">Active Masks</p>
      <div class="layer-row">
        <div class="stripe" style="background:#22D3EE"></div>
        <div class="name">Subject Mask<div class="sub">Neural segment</div></div>
        <div class="checkbox checked" onclick="this.classList.toggle('checked'); toggleMask()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
      </div>
      <div class="layer-row">
        <div class="stripe" style="background:#F472B6"></div>
        <div class="name">Background<div class="sub">Inverted mask</div></div>
        <div class="checkbox" onclick="this.classList.toggle('checked')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
      </div>
      <button class="btn-secondary" style="margin-top:16px">+ Add New Mask</button>
    `,
    History: `
      <p class="h3">Edit History</p>
      <div class="layer-row"><div class="stripe" style="background:var(--muted)"></div><div class="name">Color Grading<div class="sub">Applied effect</div></div></div>
      <div class="layer-row"><div class="stripe" style="background:var(--muted)"></div><div class="name">Portrait Blur<div class="sub">Background</div></div></div>
      <div class="layer-row"><div class="stripe" style="background:var(--muted)"></div><div class="name">SAM3 Segment<div class="sub">Subject</div></div></div>
      <button class="btn-secondary" style="margin-top:16px">↺ Undo Last Step</button>
    `,
    Server: `
      <p class="h3">Backend Configuration</p>
      <input class="input" value="https://api.visioneditcv.local" />
      <button class="btn-primary" onclick="alert('Connection successful!')">⚡ Test Connection</button>
      <div class="param" style="margin-top:16px; background: rgba(74,222,128,0.05)">
        <div class="label-row" style="margin:0"><span class="l">Status</span><span class="v" style="color:var(--success)">● Connected (24ms)</span></div>
      </div>
    `
  };

  function openSheet(tab) {
    if (activeTab === tab && sheet.classList.contains('open')) {
      closeSheet();
      return;
    }
    activeTab = tab;
    sheetTitle.textContent = tab;
    sheetBody.innerHTML = tabContent[tab] || '';
    sheet.classList.add('open');
    
    navBtns.forEach(b => {
      if (b.classList.contains('cta')) return;
      b.classList.toggle('active', b.dataset.tab === tab);
    });
  }

  function closeSheet() {
    sheet.classList.remove('open');
    activeTab = null;
    navBtns.forEach(b => {
      if (b.classList.contains('cta')) return;
      b.classList.remove('active');
    });
  }


  function toggleMask() {
    maskOverlay.classList.toggle('active');
  }

  // Initialize
  openSheet('Effects');
</script>
</body>
</html>
