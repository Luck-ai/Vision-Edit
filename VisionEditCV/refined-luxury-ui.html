
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionEdit Refined UI System</title>
  <style>
    :root {
      --bg: oklch(12% 0.01 260);
      --surface: oklch(16% 0.02 260);
      --accent: oklch(85% 0.18 200);
      --text: #ffffff;
      --text-muted: #94949e;
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .top-bar {
      padding: 48px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(12, 12, 14, 0.5);
      backdrop-filter: blur(20px);
    }
    .logo-area { display: flex; align-items: center; gap: 16px; }
    .logo-mark { width: 28px; height: 28px; background: var(--accent); clip-path: polygon(50% 0%, 0% 100%, 50% 80%, 100% 100%); }
    .brand-name { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
    .pro-badge { 
      font-size: 8px; font-weight: 900; color: var(--accent); 
      border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px;
      background: rgba(0, 229, 255, 0.1); margin-top: 4px; display: inline-block;
    }
    .main-workspace {
      display: flex;
      flex: 1;
      padding: 0 24px 24px;
      gap: 24px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .sidebar { width: 280px; padding: 24px; }
    .canvas-container { flex: 1; position: relative; background: #000; overflow: hidden; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: inset 0 0 60px rgba(0,0,0,0.6); }
    .inspector { width: 320px; padding: 24px; }
    .h2 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--glass-border);
    }
    .layer-color { width: 4px; height: 32px; border-radius: 2px; }
    .layer-info b { font-size: 14px; display: block; }
    .layer-info span { font-size: 9px; color: var(--text-muted); letter-spacing: 0.05em; }
    .bottom-bar {
      margin-top: 24px;
      padding: 28px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .slider-group { width: 150px; }
    .slider-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .slider-track { height: 4px; background: #1f1f24; border-radius: 2px; position: relative; }
    .slider-thumb { width: 14px; height: 14px; background: var(--accent); border-radius: 50%; position: absolute; top: -5px; left: 40%; border: 2px solid var(--bg); box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
    .btn { padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 12px; }
    .btn-primary { background: var(--accent); color: #000; box-shadow: 0 4px 12px rgba(0, 229, 255, 0.3); }
    .btn-ghost { background: transparent; border: 1px solid var(--glass-border); color: var(--text); }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo-area">
      <div class="logo-mark"></div>
      <div>
        <div class="brand-name">VisionEdit</div>
        <div class="pro-badge">PRO SUITE</div>
      </div>
    </div>
    <div style="background: var(--surface); padding: 4px; border-radius: 22px; display: flex; gap: 4px;">
      <div style="background: var(--accent); color: #000; padding: 8px 24px; border-radius: 18px; font-size: 11px; font-weight: 700;">BOX</div>
      <div style="padding: 8px 24px; border-radius: 18px; font-size: 11px; font-weight: 700; color: var(--text-muted);">TEXT</div>
    </div>
    <div class="btn btn-ghost" style="padding: 10px 16px;">CONNECTED: STABLE</div>
  </div>
  
  <div class="main-workspace">
    <div class="panel sidebar">
      <div class="h2">Effect Engine</div>
      <div style="opacity: 0.5; font-size: 13px;">Precision Color Grading</div>
      <div style="background: rgba(0, 229, 255, 0.1); border-left: 2px solid var(--accent); padding: 12px; margin: 12px -24px; color: var(--accent); font-weight: 600;">Neural Stylize</div>
      <div style="opacity: 0.5; font-size: 13px; margin-top: 12px;">Sticker Generator</div>
    </div>
    
    <div style="flex: 1; display: flex; flex-direction: column;">
      <div class="canvas-container">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent);"></div>
        <div style="height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0.1;">
            <div class="logo-mark" style="width: 80px; height: 80px;"></div>
        </div>
      </div>
      
      <div class="panel bottom-bar">
        <div>
          <div style="font-size: 20px; font-weight: 700;">Neural Stylize</div>
          <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 4px;">ADJUST PARAMETERS</div>
        </div>
        <div style="display: flex; gap: 40px;">
          <div class="slider-group">
            <div class="slider-label"><span>INTENSITY</span><span style="color: var(--accent)">85%</span></div>
            <div class="slider-track"><div class="slider-thumb" style="left: 85%"></div></div>
          </div>
          <div class="slider-group">
            <div class="slider-label"><span>REFINEMENT</span><span style="color: var(--accent)">42%</span></div>
            <div class="slider-track"><div class="slider-thumb" style="left: 42%"></div></div>
          </div>
        </div>
        <div style="display: flex; gap: 16px;">
          <div class="btn btn-ghost">REVERT</div>
          <div class="btn btn-primary">APPLY MASTER</div>
        </div>
      </div>
    </div>

    <div class="panel inspector">
      <div class="h2">Layer Architecture</div>
      <div class="layer-item">
        <div class="layer-color" style="background: #ff4d4d;"></div>
        <div class="layer-info"><b>Mask 1</b><span>NEURAL SEGMENT</span></div>
        <div style="margin-left: auto; width: 18px; height: 18px; border: 1px solid var(--accent); border-radius: 4px; background: var(--accent);"></div>
      </div>
      <div class="layer-item">
        <div class="layer-color" style="background: #00e5ff;"></div>
        <div class="layer-info"><b>Mask 2</b><span>NEURAL SEGMENT</span></div>
        <div style="margin-left: auto; width: 18px; height: 18px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;"></div>
      </div>
    </div>
  </div>
</body>
</html>
